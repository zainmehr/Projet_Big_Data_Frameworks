[hdfs]
raw_dvf_path      = hdfs://namenode:9000/raw/dvf
raw_communes_path = hdfs://namenode:9000/raw/communes
silver_path       = hdfs://namenode:9000/silver

[hive]
database          = silver
table_dvf_enrichi = dvf_enrichi
table_communes    = communes

[local]
dvf_csv_path      = /dvf_2025.txt
communes_csv_path = /communes_2025.csv
log_dir           = /logs

[spark]
app_name_feeder   = feeder
app_name_processor= processor
app_name_datamart = datamart
master            = local[*]

[postgres]
host              = localhost
port              = 5432
database          = immo_datamarts
user              = immo_user
password          = immo_pass
jdbc_url          = jdbc:postgresql://localhost:5432/immo_datamarts
jdbc_driver_path  = /drivers/postgresql-42.6.0.jar

[api]
host                 = 0.0.0.0
port                 = 8000
secret_key           = change_me_in_production
algorithm            = HS256
token_expire_minutes = 60